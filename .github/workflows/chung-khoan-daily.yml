name: Phân tích Chứng khoán VN (HOSE/HNX/UPCoM)

# Nhóm PHÂN TÍCH CHỨNG KHOÁN — tách biệt với nhóm hàng hóa / ngân hàng-BĐS.
# Toàn bộ mã nguồn nằm trong thư mục con chung-khoan/ (fork của daily_stock_analysis
# đã cắm nguồn dữ liệu Việt Nam qua VCIFetcher). Mã VN dùng hậu tố .VN.

on:
  workflow_dispatch:
    inputs:
      top:
        description: 'Số mã shortlist đưa vào phân tích LLM sâu'
        required: false
        default: '30'
      boards:
        description: 'Sàn quét (HOSE,HNX,UPCoM)'
        required: false
        default: 'HOSE,HNX,UPCoM'
      report_language:
        description: 'Ngôn ngữ báo cáo'
        required: false
        default: 'en'
        type: choice
        options: [en, zh]

concurrency:
  group: chung-khoan-analysis
  cancel-in-progress: false

jobs:
  analyze-vn:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: chung-khoan
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: chung-khoan/requirements.txt

      - name: Cài đặt phụ thuộc
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tạo thư mục
        run: mkdir -p data logs reports

      - name: Chạy phân tích chứng khoán VN
        env:
          # LLM — dùng lại secret GEMINI_API_KEY đã có sẵn của repo
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACK: 'gemini-2.5-flash-lite'
          GEMINI_REQUEST_DELAY: '3.0'
          # Cấu hình chạy
          SCREEN_TOP: ${{ github.event.inputs.top || '30' }}
          SCREEN_BOARDS: ${{ github.event.inputs.boards || 'HOSE,HNX,UPCoM' }}
          REPORT_LANGUAGE: ${{ github.event.inputs.report_language || 'en' }}
          REPORT_TYPE: 'simple'
          MARKET_REVIEW_ENABLED: 'false'
          MARKET_REVIEW_REGION: 'vn'
          TRADING_DAY_CHECK_ENABLED: 'false'
          SINGLE_STOCK_NOTIFY: 'false'
          LOG_LEVEL: 'INFO'
          MAX_WORKERS: '1'
        run: |
          echo "=========================================="
          echo "📈 Phân tích chứng khoán VN (HOSE/HNX/UPCoM)"
          echo "🌐 Ngôn ngữ: $REPORT_LANGUAGE | Model: $GEMINI_MODEL"
          echo "🔑 Gemini key: $([ -n "$GEMINI_API_KEY" ] && echo '✅ có' || echo '❌ thiếu')"
          echo "=========================================="
          echo "🔎 TẦNG 1 — Screener quét toàn thị trường (top $SCREEN_TOP, sàn $SCREEN_BOARDS)..."
          mkdir -p reports
          SHORTLIST=$(python scripts/vn_screener.py --top "$SCREEN_TOP" --boards "$SCREEN_BOARDS" --movers-out reports/dich-chuyen-gia.md)
          if [ -z "$SHORTLIST" ]; then echo "❌ Screener không trả mã nào"; exit 1; fi
          echo "🎯 Shortlist: $SHORTLIST"
          echo ""; echo "===== 📊 DỊCH CHUYỂN GIÁ NỔI BẬT TRONG NGÀY ====="; cat reports/dich-chuyen-gia.md; echo "================================================="
          echo "🤖 TẦNG 2 — Phân tích LLM sâu trên shortlist..."
          python main.py --stocks "$SHORTLIST" --no-market-review --force-run

      - name: Tải lên báo cáo (artifact)
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: bao-cao-chung-khoan-vn-${{ github.run_number }}
          path: |
            chung-khoan/reports/
            chung-khoan/logs/
          retention-days: 30

      - name: Hiển thị kết quả
        if: always()
        run: |
          echo "=== Báo cáo đã tạo ==="
          ls -la reports/ 2>/dev/null || echo "(chưa có báo cáo)"
          echo "=== Log cuối ==="
          tail -40 logs/*.log 2>/dev/null || echo "(không có log)"
