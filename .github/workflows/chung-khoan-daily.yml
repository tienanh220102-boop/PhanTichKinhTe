name: Phân tích Chứng khoán VN (HOSE/HNX/UPCoM)

# Nhóm PHÂN TÍCH CHỨNG KHOÁN — tách biệt với nhóm hàng hóa / ngân hàng-BĐS.
# Toàn bộ mã nguồn nằm trong thư mục con chung-khoan/ (fork của daily_stock_analysis
# đã cắm nguồn dữ liệu Việt Nam qua VCIFetcher). Mã VN dùng hậu tố .VN.

on:
  schedule:
    # Giờ VN = UTC+7. Chạy các ngày giao dịch (T2–T6).
    - cron: '30 1 * * 1-5'   # 08:30 VN — trước phiên (định hướng sáng)
    - cron: '15 8 * * 1-5'   # 15:15 VN — sau khi đóng cửa (tổng kết ngày)
  workflow_dispatch:
    inputs:
      boards:
        description: 'Sàn quét (HOSE,HNX,UPCoM)'
        required: false
        default: 'HOSE,HNX,UPCoM'
      drill:
        description: 'Số mã top-down định giá sâu'
        required: false
        default: '20'

concurrency:
  group: chung-khoan-analysis
  cancel-in-progress: false

jobs:
  analyze-vn:
    runs-on: ubuntu-latest
    timeout-minutes: 110   # 30 mã × ~150s + screener; để dư cho chắc
    defaults:
      run:
        working-directory: chung-khoan
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: chung-khoan/requirements.txt

      - name: Cài đặt phụ thuộc
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tạo thư mục
        run: mkdir -p data logs reports

      # Bản tin "dịch chuyển giá" (top tăng/giảm/bùng khối lượng) — screener KEYLESS.
      # ĐÃ BỎ tầng LLM (Gemini): tránh phụ thuộc quota, luôn có nội dung, không hallucinate.
      # Phân tích chiều sâu giờ do bước TOP-DOWN (định lượng CFA, keyless) đảm nhiệm.
      - name: Bản tin dịch chuyển giá (screener, keyless)
        if: always()
        env:
          SCREEN_BOARDS: ${{ github.event.inputs.boards || 'HOSE,HNX,UPCoM' }}
          LOG_LEVEL: 'INFO'
        run: |
          echo "🔎 Screener quét toàn thị trường (sàn $SCREEN_BOARDS) → dịch chuyển giá..."
          mkdir -p reports
          python scripts/vn_screener.py --top 30 --boards "$SCREEN_BOARDS" \
            --movers-out reports/dich-chuyen-gia.md \
            || echo "⚠️ Screener lỗi (bỏ qua — top-down vẫn chạy)"
          echo "===== 📊 DỊCH CHUYỂN GIÁ ====="; cat reports/dich-chuyen-gia.md 2>/dev/null || true

      # ---- Phân tích TOP-DOWN (định lượng, keyless, độc lập với screener+LLM) ----
      # Nền CFA L2: nhịp thị trường → ngành → định giá mã (percentile/justified P/B/CAMELS)
      # + sự kiện DN (cổ tức/ĐHCĐ/KQKD). Không dùng Gemini → không đụng quota LLM.
      # CHẠY TRƯỚC bước Telegram để nối digest vào CÙNG MỘT bản tin (ghi ra ../reports/).
      - name: Phân tích top-down (keyless)
        if: always()
        working-directory: chung-khoan/topdown
        env:
          TD_LIQUID: '120'
          TD_DRILL: ${{ github.event.inputs.drill || (github.event_name == 'schedule' && '15' || '20') }}
        run: |
          echo "🧭 Top-down: liquid $TD_LIQUID, drill $TD_DRILL (keyless, không LLM)"
          mkdir -p ../reports
          python vn_report.py --liquid "$TD_LIQUID" --drill "$TD_DRILL" \
            --digest-out ../reports/topdown_digest.txt

      # Một bản tin Telegram duy nhất: digest LLM screener + phần top-down nối vào cuối.
      # Một bản tin Telegram DUY NHẤT, hoàn toàn keyless: tin thị trường + dịch chuyển giá
      # + phần top-down định lượng. Không dùng Gemini.
      - name: Gửi digest Telegram (keyless)
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: python scripts/send_telegram_vn.py

      - name: Tải lên báo cáo (artifact)
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: bao-cao-chung-khoan-vn-${{ github.run_number }}
          path: |
            chung-khoan/reports/
            chung-khoan/logs/
            chung-khoan/topdown/reports/
          retention-days: 30

      - name: Hiển thị kết quả
        if: always()
        run: |
          echo "=== Báo cáo đã tạo ==="
          ls -la reports/ 2>/dev/null || echo "(chưa có báo cáo)"
          echo "=== Log cuối ==="
          tail -40 logs/*.log 2>/dev/null || echo "(không có log)"
