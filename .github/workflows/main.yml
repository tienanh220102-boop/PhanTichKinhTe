name: Phan Tich Kinh Te Agent

on:
  schedule:
    - cron: '*/30 * * * *'   # Chay moi 30 phut
  workflow_dispatch:          # Cho phep chay thu cong

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Commodity Agent
        env:
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:        ${{ secrets.TELEGRAM_CHAT }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          TWELVEDATA_API_KEY:   ${{ secrets.TWELVEDATA_API_KEY }}
          FRED_API_KEY:         ${{ secrets.FRED_API_KEY }}
        run: python scripts/commodity_agent.py

      - name: Run Banking & BDS Agent (gop tu repo NganHangBDS)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:  ${{ secrets.TELEGRAM_CHAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/main_agent.py --banking-only

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_commodity_news.json
          git add data/last_banking_news.json
          git add data/decisions.log || true
          git add outputs/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update commodity state [skip ci]"
          git pull --rebase -X theirs origin main
          git push

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT }}" \
            -d text="🚨 Commodity/Banking workflow FAILED — kiem tra: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
