name: Commodity Supply Chain Agent

on:
  schedule:
    - cron: '*/30 * * * *'   # Chay moi 30 phut
  workflow_dispatch:          # Cho phep chay thu cong

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Commodity Agent
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT:  ${{ secrets.TELEGRAM_CHAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/commodity_agent.py

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_commodity_news.json
          git diff --staged --quiet || git commit -m "chore: update commodity state [skip ci]"
          git push
