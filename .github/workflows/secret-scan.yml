name: secret-scan

# Backstop quet secret toan bo lich su repo.
# KHONG chay theo "push" de tiet kiem budget Actions; chi chay:
#   - weekly (cron) lam luoi an toan dinh ky
#   - thu cong (workflow_dispatch) khi can quet ngay
# Lop chinh la GitHub native Secret Scanning + Push Protection
# (Settings -> Code security and analysis) — free cho repo public, 0 chi phi Actions.

on:
  schedule:
    - cron: '0 3 * * 1'      # 03:00 UTC thu Hai hang tuan
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # quet toan bo git history, khong chi commit moi nhat
      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action FREE cho tai khoan ca nhan (personal) — khong can license.
